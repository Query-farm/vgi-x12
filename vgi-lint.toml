# vgi-lint-check configuration for vgi-x12.
#
# The x12 worker is a pure local parser. Every function ships a guaranteed-runnable
# example: the scalars (`x12_version()`, `delimiters(content)`,
# `transaction_type(content)`) run over inline content, and every TABLE function
# (segments, segments_elements, envelope, the shaped read_* views, edifact_*)
# carries an example over an INLINE interchange string — these auto-detect inline
# content by its ISA/UNA/UNB prefix and parse it directly, so the example produces
# rows with no external file (no VGI902). The file-path/glob hot path is exercised
# separately against the committed `data/` fixtures by the repo's SQLLogic E2E
# (make test-sql).
#
# All static metadata rules (titles, per-arg docs, keywords, source_url, tags)
# remain enabled and the whole suite gates at `info`.
[tool.vgi-lint-check]
select = ["ALL"]
ignore = []
fail_on = "info"

[tool.vgi-lint-check.options]
column_comment_min_ratio = 0.8
