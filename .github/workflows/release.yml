#
# Build the `x12-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/.github/workflows/rust-release.yml; this file
# gates on the repo's own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-x12-<tag>-<duckdb_platform>.tar.gz. The executable inside
# each archive is `x12-worker`, used directly as a DuckDB vgi COMMAND/LOCATION:
#   ATTACH 'x12' (TYPE vgi, COMMAND '/path/to/x12-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the same unit + SQLLogic e2e suite as push/PR.
  ci:
    # ci.yml's cargo-audit job requests `checks: write` (to post the audit
    # check-run). A called reusable workflow's jobs cannot request more than the
    # caller grants them, and this file's default token is `contents: read`, so
    # without widening the ci job here the whole release run fails at startup.
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: x12-worker
      asset_prefix: vgi-x12
      version_check_cmd: ci/check-version.sh
