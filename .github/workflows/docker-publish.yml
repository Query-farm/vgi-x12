# Copyright 2026 Query Farm LLC - https://query.farm
#
# Build and publish the multi-arch vgi-x12 image to ghcr.io. The heavy lifting
# (multi-arch build -> per-arch /health boot smoke -> image SQL suite -> push ->
# manifest -> cosign-sign) lives in the shared reusable workflow
# Query-farm/vgi-actions; this file gates on the repo's own CI suite and
# supplies the worker-specific inputs.
#
# Tag-driven: vX.Y.Z -> :X.Y.Z/:X.Y/:latest, push to main -> :edge. Publishing a
# GitHub Release creates the tag, which fires this too.
name: Publish image to ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate every image on the full unit + vgi-extension integration suite, so a
  # broken worker is never imaged. This job's permissions must be >= those any
  # job in the called ci.yml requests, or the whole run startup-fails: ci.yml's
  # `audit` job (rustsec/audit-check) needs `checks: write` to post its check
  # run, so grant it here (a called workflow job cannot exceed its caller).
  ci:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: Query-farm/vgi-actions/.github/workflows/docker-publish.yml@v1
    secrets: inherit
    with:
      image_name: vgi-x12
      # Rust binary — nothing to `import`, so the language-import smoke is skipped.
      # The reusable workflow still runs its dual-arch HTTP /health boot smoke.
      smoke_import: ""
      health_port: "8000"
      version_check_cmd: "ci/check-version.sh"
      # Validate the built image's transports against the signed vgi extension.
      # The worker *logic* is already exercised every run by the gating `ci` job
      # (all test/sql/*, three transports, two OSes), so here we only prove the
      # IMAGE's entrypoints speak the protocol:
      #   - stdio: smoke ONE inline-content file through `docker run … stdio`;
      #   - HTTP : the FULL suite against a SINGLE warm container (end-to-end
      #            image check via the default `http` entrypoint + /health).
      # $CITEST_IMAGE is the loaded <image>:citest-amd64 ref; GH_TOKEN is
      # provided for the haybarn download.
      #
      # files.test reads the committed data/ fixtures by absolute path via
      # ${VGI_X12_DATA} (= <repo>/data on the runner). The HTTP worker runs
      # INSIDE the container, so that path is bind-mounted at the identical
      # absolute path so the containerized worker resolves it. The stdio smoke
      # deliberately runs only the inline-content segments.test, which needs no
      # data files.
      image_test: |
        echo "::group::download haybarn-unittest"
        REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
        gh release download "$REL" --repo Query-farm-haybarn/haybarn \
          --pattern 'haybarn_unittest-linux-amd64.zip' --output hb.zip --clobber
        mkdir -p hb && unzip -o -q hb.zip -d hb
        export HAYBARN_UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
        chmod +x "$HAYBARN_UNITTEST"
        echo "::endgroup::"

        echo "::group::stdio entrypoint smoke (one inline file, cold container per ATTACH)"
        TRANSPORT=subprocess \
          TEST_PATTERN="test/sql/segments.test" \
          VGI_X12_WORKER="docker run -i --rm $CITEST_IMAGE stdio" \
          ci/run-integration.sh
        echo "::endgroup::"

        echo "::group::full SQL suite — HTTP transport (one warm container)"
        CID=$(docker run -d -p 18000:8000 -v "$PWD/data:$PWD/data:ro" "$CITEST_IMAGE")
        trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
        for _ in $(seq 1 30); do curl -fsS -o /dev/null http://localhost:18000/health && break; sleep 1; done
        TRANSPORT=http VGI_X12_WORKER="http://localhost:18000" ci/run-integration.sh
        echo "::endgroup::"
