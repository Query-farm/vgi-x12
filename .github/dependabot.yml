version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock). crates.io deps (arrow,
  # serde, vgi, vgi-rpc, glob, …) are checked weekly.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Arrow crates move in lockstep — bump them together.
      arrow:
        patterns:
          - "arrow*"
      # Everything else: fold minor/patch bumps into one weekly PR to cut churn;
      # majors stay individual so each breaking upgrade is reviewed on its own.
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps"

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "ci"
